version: '3'

services:
  nginx:
    image: nginx:latest
    volumes:
      - .:/var/www/
      - ./_docker/nginx_service/nginx/conf.d/:/etc/nginx/conf.d/
      - ./img:/usr/share/nginx/html/img

    ports:
      - "NGINX_PORT:NGINX_PORT"  # Nginx listens on port 80 by default
    depends_on:
      - php
    user: $UID
    container_name: nginx_service_<YOUR NAME>

  php:
    build:
      context: .
      dockerfile: ./_docker/php_service/Dockerfile
    user: $UID
    volumes:
      - ./:/var/www/
    container_name: php_service_<YOUR NAME>

  db:
    image: mariadb:10.6
    restart: always
    volumes:
      - ./_docker/db_service/tmp/db:/var/lib/mysql/
      - ./_docker/db_service/file_setting/:/docker-entrypoint-initdb.d/
    environment:
      MYSQL_DATABASE: <YOUR NAME>
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "MYSQL_PORT:3306"  # MariaDB listens on port 3306 by default
    command: 
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    container_name: db_service_<YOUR NAME>

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "PHPMYADMIN_PORT:80"  # PhpMyAdmin listens on port 80 by default
    environment:
      PMA_ARBITRARY: 1
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
      
networks:
  default:
    external:
      name: my_shared_network